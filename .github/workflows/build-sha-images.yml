name: Build SHA Images

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main
    paths:
      - "microservices/**"
      - "release/services.json"
      - ".github/workflows/build-sha-images.yml"
      - "scripts/**"

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.services.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7

      - id: services
        run: echo "matrix=$(jq -c '.services' release/services.json)" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_IMAGE_BUILDS == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate AWS image build inputs
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
        run: |
          missing=0

          if [[ -z "${AWS_REGION}" ]]; then
            echo "Repository variable AWS_REGION is required to build and push images." >&2
            missing=1
          fi

          if [[ -z "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]]; then
            echo "Repository secret AWS_GITHUB_ACTIONS_ROLE_ARN is required to build and push images." >&2
            missing=1
          fi

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service.ecrRepository }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image record
        run: |
          built_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --arg service "${{ matrix.service.id }}" \
            --arg name "${{ matrix.service.name }}" \
            --arg repository "${{ steps.login-ecr.outputs.registry }}/${{ matrix.service.ecrRepository }}" \
            --arg shaTag "sha-${{ github.sha }}" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            --arg commitSha "${{ github.sha }}" \
            --arg builtAt "${built_at}" \
            '{
              service: $service,
              name: $name,
              repository: $repository,
              shaTag: $shaTag,
              digest: $digest,
              commitSha: $commitSha,
              builtAt: $builtAt
            }' > "image-${{ matrix.service.id }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: sha-image-${{ matrix.service.id }}-${{ github.sha }}
          path: image-${{ matrix.service.id }}.json

      - name: Add workflow summary
        run: |
          {
            echo "### ${{ matrix.service.name }}"
            echo ""
            echo "- Repository: \`${{ steps.login-ecr.outputs.registry }}/${{ matrix.service.ecrRepository }}\`"
            echo "- Tag: \`sha-${{ github.sha }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
