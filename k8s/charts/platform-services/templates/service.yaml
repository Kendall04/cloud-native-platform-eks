{{- $root := . -}}
{{- range $serviceKey, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $service.name }}
  namespace: {{ $root.Values.namespace.name }}
  labels:
{{ include "platform-services.labels" (dict "root" $root "service" $service) | indent 4 }}
spec:
  type: {{ $root.Values.global.service.type }}
  selector:
{{ include "platform-services.selectorLabels" (dict "root" $root "service" $service) | indent 4 }}
  ports:
    - name: http
      port: {{ $service.port | default $root.Values.global.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
{{- end }}
